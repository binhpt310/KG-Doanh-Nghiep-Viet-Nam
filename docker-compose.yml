services:
  neo4j:
    image: neo4j:5-community
    container_name: kg-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password123}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_pagecache_size=512M
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-password123}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  kg-app:
    build: .
    container_name: kg-app
    restart: unless-stopped
    ports:
      - "5001:5001"
    # Một file env duy nhất (đồng bộ với symlink .env ở thư mục gốc cho Compose)
    env_file:
      - ./kg_from_scratch/.env.docker
    volumes:
      # Mount data directories để crawl data được persist trên host
      - ./kg_from_scratch/data:/app/kg_from_scratch/data
      # Mount source code để script.py và các frontend files tự động reload
      - ./kg_from_scratch:/app/kg_from_scratch
      # Mount ChromaDB vector data để semantic search không bị mất sau khi restart
      - llmware_data:/root/llmware_data
    depends_on:
      neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  neo4j_data:
  neo4j_logs:
  llmware_data:
